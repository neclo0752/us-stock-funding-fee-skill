<?xml version="1.0" encoding="UTF-8"?>
<svg width="1536" height="2048" viewBox="0 0 1536 2048" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#031A4A"/>
      <stop offset="100%" stop-color="#3A0D1F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1536" height="2048" fill="url(#bg)"/>

  <!-- left card -->
  <rect x="95" y="240" rx="42" ry="42" width="520" height="540" fill="#10AFFF" filter="url(#shadow)"/>
  <text x="150" y="430" fill="#fff" font-size="130" font-weight="700" font-family="Georgia, serif">SCH</text>
  <text x="150" y="565" fill="#fff" font-size="130" font-weight="700" font-family="Georgia, serif">WAB</text>

  <!-- right card -->
  <rect x="921" y="240" rx="42" ry="42" width="520" height="540" fill="#fff" filter="url(#shadow)"/>
  <polygon points="972,430 1077,340 1285,340 1390,430 1285,520 1077,520" fill="#E4002B"/>
  <polygon points="1077,340 1177,430 1077,520 972,430" fill="#fff"/>
  <polygon points="1285,340 1185,430 1285,520 1390,430" fill="#fff"/>
  <text x="1167" y="650" fill="#333" font-size="72" font-family="Arial, sans-serif" text-anchor="middle" font-weight="700">HK</text>

  <!-- arrow -->
  <line x1="640" y1="550" x2="895" y2="550" stroke="#FFB08F" stroke-width="7"/>
  <polygon points="895,550 855,530 855,570" fill="#FFB08F"/>
  <text x="767" y="500" fill="#FF6A3D" font-size="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" text-anchor="middle" font-weight="700">出金</text>

  <!-- titles -->
  <text x="768" y="1140" fill="#fff" font-size="92" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" text-anchor="middle" font-weight="700">嘉信出金到汇丰香港</text>
  <text x="768" y="1295" fill="#FFC261" font-size="72" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" text-anchor="middle" font-weight="700">一张看懂：怎么出金最省钱</text>

  <rect x="320" y="1380" rx="8" ry="8" width="896" height="132" fill="#F7D548"/>
  <text x="768" y="1466" fill="#0D2E63" font-size="62" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" text-anchor="middle" font-weight="800">5种路径对比｜成本与稳定性</text>

  <text x="768" y="1660" fill="#fff" font-size="62" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" text-anchor="middle">小额/大额怎么选（附避坑）</text>
</svg>